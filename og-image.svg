<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf9f5"/>
      <stop offset="100%" style="stop-color:#f0e6da"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c4847a"/>
      <stop offset="100%" style="stop-color:#e0afa8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="980" cy="100" r="220" fill="#f5e4e1" opacity="0.5"/>
  <circle cx="1080" cy="520" r="160" fill="#ddeee3" opacity="0.35"/>
  <circle cx="100" cy="540" r="180" fill="#f5e4e1" opacity="0.3"/>

  <!-- Left accent bar -->
  <rect x="80" y="160" width="4" height="310" fill="url(#accent)" rx="2"/>

  <!-- Brand name -->
  <text x="112" y="255" font-family="Georgia, serif" font-size="72" font-weight="500" letter-spacing="4" fill="#2c1f18">CADENZA</text>

  <!-- Rose dot on the A -->
  <text x="112" y="255" font-family="Georgia, serif" font-size="72" font-weight="500" letter-spacing="4" fill="#c4847a">C</text>

  <!-- Tagline word -->
  <text x="114" y="310" font-family="Georgia, serif" font-size="28" font-style="italic" fill="#8a6f63" letter-spacing="2">Enterprises</text>

  <!-- Divider line -->
  <rect x="112" y="338" width="320" height="1" fill="#c4847a" opacity="0.4"/>

  <!-- Description -->
  <text x="112" y="378" font-family="Arial, sans-serif" font-size="20" font-weight="300" fill="#8a6f63" letter-spacing="1">COLOUR COSMETICS MANUFACTURING</text>

  <!-- Sub-description -->
  <text x="112" y="415" font-family="Arial, sans-serif" font-size="16" font-weight="300" fill="#a08070">Private Label  ·  Contract Manufacturing  ·  Custom Formulation</text>

  <!-- Bottom URL -->
  <text x="112" y="490" font-family="Arial, sans-serif" font-size="15" fill="#c4847a" letter-spacing="1">cadenzaenterprises.in</text>

  <!-- Decorative rose petal shapes (right side) -->
  <ellipse cx="850" cy="315" rx="120" ry="60" fill="#e0afa8" opacity="0.25" transform="rotate(-30 850 315)"/>
  <ellipse cx="920" cy="270" rx="100" ry="50" fill="#c4847a" opacity="0.15" transform="rotate(20 920 270)"/>
  <ellipse cx="800" cy="380" rx="90" ry="45" fill="#8aab94" opacity="0.2" transform="rotate(10 800 380)"/>
  <ellipse cx="970" cy="350" rx="110" ry="55" fill="#e0afa8" opacity="0.2" transform="rotate(-15 970 350)"/>
</svg>
